<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Fans</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff4081;
  --pink-dark: #c2185b;
  --pink-glow: rgba(255,64,129,0.25);
  --bg: #080808;
  --surface: #141414;
  --surface2: #1e1e1e;
  --text: #f2ece6;
  --text-muted: #777;
  --border: #2a2a2a;
  --admin-gold: #ffd700;
  --admin-glow: rgba(255,215,0,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ═══════════════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #080808;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: splashFadeOut 0.6s ease forwards 2.6s;
}
#splash::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,64,129,0.12) 0%, transparent 65%);
  animation: splashPulse 1.8s ease-in-out infinite;
}
@keyframes splashPulse {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
@keyframes splashFadeOut {
  to { opacity: 0; pointer-events: none; }
}
.splash-logo {
  width: 160px; height: 160px;
  object-fit: contain;
  animation: splashLogoIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: scale(0.7);
  filter: drop-shadow(0 0 30px rgba(255,64,129,0.5));
}
@keyframes splashLogoIn {
  to { opacity: 1; transform: scale(1); }
}
.splash-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 300;
  letter-spacing: 6px;
  color: var(--text);
  margin-top: 20px;
  opacity: 0;
  animation: splashTextIn 0.7s ease forwards 0.5s;
}
.splash-name em { color: var(--pink); font-style: italic; font-weight: 400; }
@keyframes splashTextIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.splash-bar {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
  margin-top: 16px;
  opacity: 0;
  animation: splashBarIn 0.5s ease forwards 0.9s;
}
@keyframes splashBarIn { to { opacity: 1; } }
.splash-tagline {
  font-size: 0.7rem;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 14px;
  opacity: 0;
  animation: splashTextIn 0.5s ease forwards 1.1s;
}

/* ═══════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════ */
#auth-screen {
  display: none;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
/* partículas de fundo */
#auth-screen::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,64,129,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,64,129,0.05) 0%, transparent 50%);
  pointer-events: none;
}
.auth-particles {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--pink);
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  10% { opacity: 0.6; transform: translateY(-10px) scale(1); }
  90% { opacity: 0.2; }
  100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
}
.auth-inner {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding: 50px 24px 40px;
  min-height: 100vh;
  justify-content: center;
}

.auth-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--text);
  margin-bottom: 4px;
}
.auth-title em { color: var(--pink); font-style: italic; }
.auth-subtitle {
  font-size: 0.72rem;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 36px;
}
.auth-card {
  width: 100%; max-width: 360px;
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 28px 24px;
  border: 1px solid rgba(255,64,129,0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  animation: cardReveal 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: translateY(30px);
}
@keyframes cardReveal {
  to { opacity: 1; transform: translateY(0); }
}
.auth-card input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.auth-card input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,64,129,0.1);
}
.auth-card input::placeholder { color: var(--text-muted); }
.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  color: #fff; border: none; border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem; font-weight: 500;
  cursor: pointer; letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,64,129,0.35);
  margin-bottom: 10px;
}
.btn-primary:hover { opacity: 0.9; box-shadow: 0 6px 28px rgba(255,64,129,0.5); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  width: 100%; padding: 13px;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--border); border-radius: 12px;
  font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.btn-secondary:hover { border-color: var(--pink); color: var(--pink); }

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
#main-app { display: none; padding-bottom: 70px; }

/* ADMIN BADGE */
#admin-badge {
  display: none;
  position: fixed; top: 12px; right: 12px;
  background: var(--admin-gold); color: #000;
  font-size: 0.65rem; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  z-index: 999; letter-spacing: 1px;
  box-shadow: 0 0 14px var(--admin-gold);
  animation: pulseGold 2s infinite;
}
@keyframes pulseGold {
  0%,100% { box-shadow: 0 0 14px var(--admin-gold); }
  50% { box-shadow: 0 0 28px var(--admin-gold), 0 0 50px rgba(255,215,0,0.3); }
}

/* TABS */
.tab { display: none; padding: 20px 14px 80px; }
.tab.active { display: block; }
.tab-header {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 400;
  color: var(--text); margin-bottom: 16px;
  letter-spacing: 1px;
}

/* FEED */
#feed-controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
#feed-controls select, #feed-controls input {
  flex: 1; min-width: 120px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; outline: none; transition: border-color 0.2s;
}
#feed-controls select:focus, #feed-controls input:focus { border-color: var(--pink); }
#feed-controls select option { background: var(--surface); }
#feed-controls input::placeholder { color: var(--text-muted); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.post {
  background: var(--surface); border-radius: 12px;
  overflow: hidden; position: relative;
  border: 1px solid var(--border); cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.post:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.post img, .post video {
  width: 100%; display: block; aspect-ratio: 4/5; object-fit: cover;
}
.post .post-caption {
  padding: 8px 10px; font-size: 0.78rem;
  color: var(--text-muted); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.post-creator { padding: 8px 10px 0; font-size: 0.75rem; color: var(--pink); font-weight: 500; }
.blur-wrap { position: relative; }
.blur-wrap .blur-media { filter: blur(14px); transform: scale(1.05); }
.blur-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.45); gap: 8px;
}
.blur-overlay span { font-size: 1.6rem; }
.blur-overlay p { font-size: 0.78rem; color: #fff; font-weight: 500; }
.unlock-btn {
  background: var(--pink); color: #fff; border: none;
  padding: 7px 16px; border-radius: 20px;
  font-size: 0.78rem; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.2s;
}
.unlock-btn:hover { background: var(--pink-dark); }
.post.admin-view { border-color: var(--admin-gold); box-shadow: 0 0 0 1px var(--admin-gold), inset 0 0 20px var(--admin-glow); }
.admin-tag {
  position: absolute; top: 6px; left: 6px;
  background: var(--admin-gold); color: #000;
  font-size: 0.62rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; letter-spacing: 0.5px; z-index: 2;
}

/* INBOX */
.message-thread { max-height: 360px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
.message-item { background: var(--surface); border-radius: 10px; padding: 10px 14px; border: 1px solid var(--border); font-size: 0.88rem; }
.message-item b { color: var(--pink); font-weight: 500; }
.message-item .msg-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
.inbox-input-row { display: flex; gap: 8px; }
.inbox-input-row input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text);
  font-family: 'DM Sans', sans-serif; outline: none;
}
.inbox-input-row input:focus { border-color: var(--pink); }
.inbox-input-row input::placeholder { color: var(--text-muted); }
.inbox-input-row button { background: var(--pink); color: #fff; border: none; border-radius: 10px; padding: 12px 18px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* UPLOAD */
.upload-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.upload-opt-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 8px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  cursor: pointer; text-align: center; transition: border-color 0.2s, background 0.2s;
}
.upload-opt-btn:hover { border-color: var(--pink); background: var(--surface2); }
.upload-opt-btn span { display: block; font-size: 1.5rem; margin-bottom: 6px; }
#upload-preview > div { background: var(--surface); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
#upload-preview img, #upload-preview video { width: 100%; border-radius: 8px; margin-bottom: 8px; }
#upload-preview textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
  resize: vertical; outline: none; margin-bottom: 8px;
}
#upload-preview button { background: var(--pink); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* CLIENTES */
.add-cliente-form { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 16px; }
.add-cliente-form h3 { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
.add-cliente-form input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 14px; color: var(--text);
  font-family: 'DM Sans', sans-serif; margin-bottom: 10px; outline: none; transition: border-color 0.2s;
}
.add-cliente-form input:focus { border-color: var(--pink); }
.add-cliente-form input::placeholder { color: var(--text-muted); }
.cliente-item {
  background: var(--surface); border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; font-size: 0.88rem;
}
.status-ativo { color: #4caf50; font-size: 0.78rem; font-weight: 500; }
.status-inativo { color: #f44336; font-size: 0.78rem; font-weight: 500; }

/* ═══════════════════════════════════════════
   PERFIL
═══════════════════════════════════════════ */

/* Wrapper geral — NÃO tem overflow:hidden */
.perfil-hero {
  position: relative;
  margin-bottom: 0;
}

/* Capa: cantos arredondados só em cima */
.perfil-capa-wrap {
  position: relative;
  border-radius: 16px 16px 0 0;
  overflow: hidden;
  line-height: 0;
  /* overflow:hidden aqui clipa só a capa — avatar fica fora desta div */
}
.perfil-capa {
  width: 100%; height: 160px; object-fit: cover; display: block;
}
.perfil-capa-placeholder {
  width: 100%; height: 160px;
  background: linear-gradient(135deg, #1a0010 0%, #2a0020 50%, #1a0010 100%);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px;
  text-transform: uppercase; position: relative;
}
.perfil-capa-placeholder::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,64,129,0.08) 0%, transparent 70%);
}
.btn-edit-capa {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.6); color: #fff;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
  padding: 5px 12px; font-size: 0.72rem;
  font-family: 'DM Sans', sans-serif; cursor: pointer; backdrop-filter: blur(6px);
  transition: background 0.2s; z-index: 3;
}
.btn-edit-capa:hover { background: rgba(255,64,129,0.5); }

/* Avatar flutua por cima da capa e do card info */
.perfil-avatar-wrap {
  position: absolute;
  bottom: -44px;          /* metade do avatar para fora da capa */
  left: 20px;
  z-index: 10;            /* acima de tudo */
}
.perfil-avatar-ring {
  width: 88px; height: 88px; border-radius: 50%;
  border: 3px solid var(--pink);
  box-shadow: 0 0 0 3px var(--bg), 0 0 20px rgba(255,64,129,0.4);
  /* borda dupla: anel rosa + fundo escuro entre avatar e capa */
  overflow: hidden; position: relative; cursor: pointer;
  transition: box-shadow 0.2s;
  background: var(--bg);
}
.perfil-avatar-ring:hover {
  box-shadow: 0 0 0 3px var(--bg), 0 0 30px rgba(255,64,129,0.6);
}
.perfil-avatar-ring img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.avatar-edit-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  font-size: 1.4rem; border-radius: 50%;
}
.perfil-avatar-ring:hover .avatar-edit-overlay { opacity: 1; }

/* Card de info começa com padding-top grande para dar espaço ao avatar */
.perfil-info-row {
  padding: 56px 16px 18px 20px;
  background: var(--surface);
  border-radius: 0 0 16px 16px;
  border: 1px solid var(--border);
  border-top: none;
}
.perfil-nome-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.perfil-nome-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem; font-weight: 400; letter-spacing: 0.5px;
}
.btn-edit-nome {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 1rem; padding: 2px 6px;
  border-radius: 6px; transition: color 0.2s, background 0.2s;
}
.btn-edit-nome:hover { color: var(--pink); background: rgba(255,64,129,0.08); }
.perfil-bio-display { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 14px; min-height: 20px; }
.perfil-stats { display: flex; gap: 20px; }
.stat { text-align: center; }
.stat .val { font-size: 1.2rem; font-weight: 700; color: var(--pink); }
.stat .lbl { font-size: 0.7rem; color: var(--text-muted); }

/* EDIT FIELDS inline */
.edit-inline {
  display: none;
  background: var(--surface2); border: 1px solid var(--pink);
  border-radius: 10px; padding: 10px 14px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; outline: none; width: 100%; margin-bottom: 8px;
}
.edit-inline.visible { display: block; }
.edit-inline-actions { display: none; gap: 8px; margin-bottom: 12px; }
.edit-inline-actions.visible { display: flex; }
.btn-save { background: var(--pink); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; }
.btn-cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: rgba(14,14,14,0.95);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0 14px; z-index: 100;
  backdrop-filter: blur(20px);
}
.nav-btn {
  background: none; border: none; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.65rem;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 0 12px;
  transition: color 0.2s;
}
.nav-btn span { font-size: 1.2rem; }
.nav-btn.active { color: var(--pink); }
.nav-plus {
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  color: #fff; border: none; border-radius: 50%;
  width: 46px; height: 46px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; margin-top: -16px;
  box-shadow: 0 4px 20px rgba(255,64,129,0.45); cursor: pointer;
  transition: transform 0.2s;
}
.nav-plus:active { transform: scale(0.92); }

/* NOTIFICATION */
.notification {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--pink);
  color: var(--text); padding: 10px 22px; border-radius: 30px;
  font-size: 0.82rem; z-index: 2000; display: none;
  box-shadow: 0 4px 20px rgba(255,64,129,0.25);
  white-space: nowrap;
}

/* Avatar placeholder icon */
.avatar-placeholder-icon {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  background: var(--surface2);
}
#perfil-avatar[src=""] + .avatar-placeholder-icon,
#perfil-avatar:not([src]) + .avatar-placeholder-icon { display: flex; }
#perfil-avatar[src]:not([src=""]) { display: block !important; }
#perfil-avatar[src]:not([src=""]) ~ .avatar-placeholder-icon { display: none !important; }

/* Char counter */
.char-counter {
  font-size: 0.7rem; color: var(--text-muted);
  text-align: right; margin-top: -6px; margin-bottom: 8px;
  letter-spacing: 0.5px;
}

/* Nav SVG inherit color */
.nav-btn svg { stroke: currentColor; display: block; }
.upload-opt-btn svg { stroke: currentColor; margin: 0 auto 8px; display: block; }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>
<body>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
  <img class="splash-logo" src="https://i.ibb.co/VYFcgyy2/file-000000002534720e848ec060e606b316.png" alt="Secret Fans Logo">
  <div class="splash-name">SECRET <em>FANS</em></div>
  <div class="splash-bar"></div>
  <div class="splash-tagline">Conteúdo exclusivo VIP</div>
</div>

<!-- ═══ NOTIFICATION ═══ -->
<div class="notification" id="notification"></div>
<div id="admin-badge">ADMIN</div>

<!-- ═══ AUTH ═══ -->
<div id="auth-screen">
  <div class="auth-particles" id="particles"></div>
  <div class="auth-inner">
    <div class="auth-title">SECRET <em>FANS</em></div>
    <div class="auth-subtitle">Conteúdo exclusivo VIP</div>
    <div class="auth-card">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Senha">

<script>
// ── FIREBASE ──────────────────────────────────────────────
const firebaseConfig = {

  authDomain: "royalcore-vipfans.firebaseapp.com",

  storageBucket: "royalcore-vipfans.firebasestorage.app",

  measurementId: "G-KZ0S2J26NM"
};
firebase.initializeApp(firebaseConfig);

const ADMIN_UID = "pwCNtfxEoxTiAnaW09kn8vEUU4n2";
let userId = null, isAdmin = false, userData = null, currentMessageTo = null;

// ── SPLASH → AUTH ─────────────────────────────────────────
setTimeout(() => {

// ── NOTIFICAÇÃO ───────────────────────────────────────────
function notify(msg) {
  const n = document.getElementById('notification');
  n.innerText = msg; n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

// ── AUTH ──────────────────────────────────────────────────
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(u => initApp(u.user.uid))
    .catch(e => alert(e.message));
}
function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(u => {
      firebase.database().ref('criadoras/' + u.user.uid + '/profile').set({
        nome: email.split('@')[0], bio: '', avatar: '', capa: '',
        seguidores: {}, fotos: {}, videos: {}, clientes: {}, inbox: {}
      });
      initApp(u.user.uid);
    })

// ── INIT ──────────────────────────────────────────────────
function initApp(uid) {
  userId = uid; isAdmin = (uid === ADMIN_UID);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  if (isAdmin) {
    document.getElementById('admin-badge').style.display = 'block';
    notify('Bem-vindo, Admin. Acesso total liberado.');
  }
  loadFeed(true); loadPerfil(); loadClientes(); loadMessages();
  window.onscroll = () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) loadFeed();
  };
}

// ── NAV ───────────────────────────────────────────────────
function openTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + tab);
  if (nb) nb.classList.add('active');
}

// ── FEED ──────────────────────────────────────────────────
function loadFeed(reset = false) {
  const feed = document.getElementById('feed-list');
  if (reset) feed.innerHTML = '';
  const filtro = document.getElementById('feed-filter').value;
  const search = document.getElementById('search-creators').value.toLowerCase();

  firebase.database().ref('/criadoras/').once('value').then(snap => {
    if (reset) feed.innerHTML = '';
    snap.forEach(cSnap => {
      const criadora = cSnap.val();
      const profile = criadora.profile || {};
      const nomeCriadora = profile.nome || cSnap.key;
      if (search && !nomeCriadora.toLowerCase().includes(search)) return;

      function adicionarConteudo(item, tipo) {
        const acessoPrivado = item.privada && !isAdmin && (!item.acesso || !item.acesso[userId]);
        if (!isAdmin) {
          if (filtro === 'previas' && item.privada) return;
          if (filtro === 'privadas' && !item.privada) return;
        }
        const mediaTag = tipo === 'video'
          ? `<video src="${item.url}" ${isAdmin ? 'controls' : ''} class="${acessoPrivado ? 'blur-media' : ''}"></video>`
          : `<img src="${item.url}" class="${acessoPrivado ? 'blur-media' : ''}"/>`;
        const blurOverlay = acessoPrivado ? `<div class="blur-overlay"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><p>Conteúdo Privado</p><button class="unlock-btn" onclick="comprarAcesso(event,'${cSnap.key}')">Desbloquear</button></div>` : '';
        const adminTag = isAdmin && item.privada ? `<div class="admin-tag">PRIVADO</div>` : '';
        const postClass = `post${isAdmin && item.privada ? ' admin-view' : ''}`;
        feed.innerHTML += `<div class="${postClass}" onclick="openProfile('${cSnap.key}')">
          ${adminTag}<div class="blur-wrap">${mediaTag}${blurOverlay}</div>
          <div class="post-creator">${nomeCriadora}</div>
          <div class="post-caption">${item.legenda || ''}</div></div>`;
      }
      if (criadora.fotos) Object.values(criadora.fotos).forEach(f => adicionarConteudo(f, 'foto'));
      if (criadora.videos) Object.values(criadora.videos).forEach(v => adicionarConteudo(v, 'video'));
    });
  });
}

function openProfile(criadoraId) {
  openTab('perfil');
  firebase.database().ref('/criadoras/' + criadoraId + '/profile').once('value').then(snap => {
    const p = snap.val() || {};
    const avImg = document.getElementById('perfil-avatar');
    const avPl2 = avImg.nextElementSibling;
    if (p.avatar) { avImg.src = p.avatar; avImg.style.display = 'block'; if(avPl2) avPl2.style.display='none'; }
    else { avImg.style.display = 'none'; if(avPl2) avPl2.style.display='flex'; }
    document.getElementById('perfil-nome').innerText = p.nome || criadoraId;
    document.getElementById('perfil-bio').innerText = p.bio || '';
    document.getElementById('perfil-seguidores').innerText = Object.keys(p.seguidores || {}).length;
    document.getElementById('perfil-fotos').innerText = Object.keys(p.fotos || {}).length;
    document.getElementById('perfil-videos').innerText = Object.keys(p.videos || {}).length;
    setCapa(p.capa || '');
  });
}

function comprarAcesso(e, criadoraId) {
  e.stopPropagation();
  if (isAdmin) { notify('Acesso de administrador.'); return; }
  const id = firebase.database().ref('criadoras/' + criadoraId + '/clientes').push().key;
  firebase.database().ref('criadoras/' + criadoraId + '/clientes/' + id).set({ nome: 'Cliente', senha: '123', dias: 30, ativo: true, dataInicio: Date.now() });
  notify('Acesso desbloqueado com sucesso.'); loadFeed(true);
}

// ── IMGBB API ─────────────────────────────────────────────
// Usado para: avatar, capa, prévias grátis (conteúdo público)
// Fotos/vídeos privados → Firebase Storage (protegido)
const IMGBB_KEY = 'e26c6db41989b9106d538114c380a133';

async function uploadImgBB(file) {
  const formData = new FormData();
  formData.append('image', file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
    method: 'POST', body: formData
  });
  const data = await res.json();
  if (data.success) return data.data.url;
  throw new Error('ImgBB: ' + (data.error?.message || 'Falha no upload'));
}

async function uploadFirebase(file, path) {
  const ref = firebase.storage().ref(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}

// ── UPLOAD (posts) ────────────────────────────────────────
function openUpload(tipo) {
  const input = document.createElement('input');
  input.type = 'file'; input.multiple = true;
  input.accept = tipo === 'foto' ? 'image/*' : tipo === 'video' ? 'video/*' : 'image/*,video/*';
  input.onchange = e => previewUpload(e.target.files, tipo);
  input.click();
}

function previewUpload(files, tipo) {
  const preview = document.getElementById('upload-preview');
  preview.innerHTML = '';
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(evt) {
      const container = document.createElement('div');
      const isVideo = file.type.startsWith('video/');
      const mediaHTML = isVideo
        ? `<video src="${evt.target.result}" controls></video>`
        : `<img src="${evt.target.result}"/>`;
      const badge = tipo === 'previa'
        ? `<div style="display:inline-block;background:rgba(255,64,129,0.15);border:1px solid var(--pink);color:var(--pink);font-size:0.72rem;padding:3px 10px;border-radius:20px;margin-bottom:8px">Prévia · ImgBB</div>`
        : isVideo
          ? `<div style="display:inline-block;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-muted);font-size:0.72rem;padding:3px 10px;border-radius:20px;margin-bottom:8px">Privado · Firebase</div>`
          : `<div style="display:inline-block;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-muted);font-size:0.72rem;padding:3px 10px;border-radius:20px;margin-bottom:8px">Privado · Firebase</div>`;
      container.innerHTML = `${mediaHTML}${badge}<textarea placeholder="Legenda (opcional)"></textarea><button onclick="uploadFile(this,'${tipo}','${file.name}')">Fazer Upload</button>`;
      container._file = file;
      container._isVideo = isVideo;
      preview.appendChild(container);
    };
    reader.readAsDataURL(file);
  });
}

// Sanitiza nome para uso como chave no Firebase Database
// Remove/substitui: . # $ [ ] e outros caracteres inválidos
function sanitizarChave(nome) {
  return nome
    .replace(/\.[^.]+$/, '')          // remove extensão (.png, .jpg, .mp4...)
    .replace(/[.#$[\]]/g, '_')        // substitui chars inválidos por _
    .replace(/[^a-zA-Z0-9_\-]/g, '_') // remove qualquer outro char especial
    .replace(/_+/g, '_')              // colapsa underscores múltiplos
    .substring(0, 60);                // limita tamanho da chave
}

async function uploadFile(btn, tipo, nome) {
  const legenda = btn.previousElementSibling.previousElementSibling.value;
  const container = btn.parentElement;
  const file = container._file;
  const isVideo = container._isVideo;
  if (!file) return alert('Arquivo não encontrado');

  // Chave limpa para o Firebase Database (sem pontos, #, $, [], etc.)
  const chave = sanitizarChave(nome) || ('media_' + Date.now());

  btn.disabled = true;
  btn.innerText = 'Enviando...';

  try {
    let url;

    if (tipo === 'previa') {
      notify('Enviando...');
      url = await uploadImgBB(file);
    } else if (isVideo) {
      notify('Enviando...');
      url = await uploadFirebase(file, `criadoras/${userId}/videos/${chave}`);
    } else {
      notify('Enviando...');
      url = await uploadFirebase(file, `criadoras/${userId}/fotos/${chave}`);
    }

    const refPath = `criadoras/${userId}/${isVideo ? 'videos' : 'fotos'}/${chave}`;
    await firebase.database().ref(refPath).set({
      url,
      privada: tipo !== 'previa',
      legenda,
      acesso: {},
      origem: tipo === 'previa' ? 'imgbb' : 'firebase'
    });

    notify('Upload concluído.');
    loadFeed(true); loadPerfil();
    container.remove();
  } catch(e) {
    btn.disabled = false;
    btn.innerText = 'Fazer Upload';
    alert('Erro: ' + e.message);
  }
}

// ── CLIENTES ─────────────────────────────────────────────
function addCliente() {
  const nome = document.getElementById('cliente-nome').value;
  const senha = document.getElementById('cliente-senha').value;
  const dias = parseInt(document.getElementById('cliente-dias').value);
  if (!nome || !senha || !dias) return alert('Preencha todos os campos');
  const id = firebase.database().ref().push().key;
  firebase.database().ref('criadoras/' + userId + '/clientes/' + id).set({ nome, senha, dias, ativo: true, dataInicio: Date.now() });
  notify('Cliente registrado.'); loadClientes();
}
function loadClientes() {
  const lista = document.getElementById('clientes-list');
  lista.innerHTML = '';
  firebase.database().ref('criadoras/' + userId + '/clientes').once('value').then(snap => {
    snap.forEach(c => {
      const cl = c.val();
      const diasPassados = (Date.now() - cl.dataInicio) / 86400000;
      const expirada = diasPassados > cl.dias;
      if (expirada && cl.ativo) { cl.ativo = false; firebase.database().ref('criadoras/' + userId + '/clientes/' + c.key + '/ativo').set(false); }
      const diasRestantes = Math.max(0, Math.ceil(cl.dias - diasPassados));
      lista.innerHTML += `<div class="cliente-item"><div><div style="font-weight:500">${cl.nome}</div><div style="font-size:0.75rem;color:var(--text-muted)">${diasRestantes} dias restantes</div></div><span class="${cl.ativo ? 'status-ativo' : 'status-inativo'}">${cl.ativo ? 'Ativo' : 'Expirado'}</span></div>`;
    });
    if (!snap.exists()) lista.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:20px">Nenhum cliente ainda.</p>';
  });
}

// ── INBOX ─────────────────────────────────────────────────
function loadMessages() {
  const msgList = document.getElementById('messages-list');
  firebase.database().ref('criadoras/' + userId + '/inbox').on('value', snap => {
    msgList.innerHTML = '';
    snap.forEach(m => {
      const msg = m.val();
      const hora = new Date(msg.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      msgList.innerHTML += `<div class="message-item"><b>${msg.de === userId ? 'Você' : msg.de}</b>: ${msg.texto}<div class="msg-time">${hora}</div></div>`;
    });
    msgList.scrollTop = msgList.scrollHeight;
  });
}
function sendMessage() {
  const texto = document.getElementById('msg-input').value.trim();
  if (!texto) return;
  const id = firebase.database().ref().push().key;
  firebase.database().ref('criadoras/' + userId + '/inbox/' + id).set({ de: userId, para: currentMessageTo || 'criadora', texto, timestamp: Date.now() });
  document.getElementById('msg-input').value = '';
}

// ── PERFIL ────────────────────────────────────────────────
function loadPerfil() {
  firebase.database().ref('/criadoras/' + userId + '/profile').once('value').then(snap => {
    userData = snap.val() || {};
    const av = document.getElementById('perfil-avatar');
    const avPlaceholder = av.nextElementSibling;
    if (userData.avatar) {
      av.src = userData.avatar; av.style.display = 'block';
      if (avPlaceholder) avPlaceholder.style.display = 'none';
    } else {
      av.style.display = 'none';
      if (avPlaceholder) avPlaceholder.style.display = 'flex';
    }
    document.getElementById('perfil-nome').innerText = userData.nome || userId;
    document.getElementById('perfil-bio').innerText = userData.bio || 'Toque para adicionar bio...';
    document.getElementById('perfil-seguidores').innerText = Object.keys(userData.seguidores || {}).length;
    document.getElementById('perfil-fotos').innerText = Object.keys(userData.fotos || {}).length;
    document.getElementById('perfil-videos').innerText = Object.keys(userData.videos || {}).length;
    setCapa(userData.capa || '');
  });
}

function setCapa(url) {
  const img = document.getElementById('perfil-capa-img');
  const placeholder = document.getElementById('perfil-capa-placeholder');
  if (url) { img.src = url; img.style.display = 'block'; placeholder.style.display = 'none'; }
  else { img.style.display = 'none'; placeholder.style.display = 'flex'; }
}

// editar nome
function toggleEditNome() {
  const input = document.getElementById('edit-nome-input');
  const actions = document.getElementById('edit-nome-actions');
  input.value = document.getElementById('perfil-nome').innerText;
  input.classList.toggle('visible');
  actions.classList.toggle('visible');
  if (input.classList.contains('visible')) {
    input.focus();
    document.getElementById('nome-chars').innerText = input.value.length;
    input.oninput = () => document.getElementById('nome-chars').innerText = input.value.length;
  }
}
function salvarNome() {
  const novoNome = document.getElementById('edit-nome-input').value.trim();
  if (!novoNome) return;
  firebase.database().ref('criadoras/' + userId + '/profile/nome').set(novoNome);
  document.getElementById('perfil-nome').innerText = novoNome;
  cancelarEditNome(); notify('Nome atualizado.');
}
function cancelarEditNome() {
  document.getElementById('edit-nome-input').classList.remove('visible');
  document.getElementById('edit-nome-actions').classList.remove('visible');
}

// editar bio
function toggleEditBio() {
  const input = document.getElementById('edit-bio-input');
  const actions = document.getElementById('edit-bio-actions');
  const bio = document.getElementById('perfil-bio').innerText;
  input.value = (bio === 'Toque para adicionar bio...') ? '' : bio;
  input.classList.add('visible'); actions.classList.add('visible'); input.focus();
}
function salvarBio() {
  const novaBio = document.getElementById('edit-bio-input').value.trim();
  firebase.database().ref('criadoras/' + userId + '/profile/bio').set(novaBio);
  document.getElementById('perfil-bio').innerText = novaBio || 'Toque para adicionar bio...';
  cancelarEditBio(); notify('Bio atualizada.');
}
function cancelarEditBio() {
  document.getElementById('edit-bio-input').classList.remove('visible');
  document.getElementById('edit-bio-actions').classList.remove('visible');
}

// ── AVATAR → ImgBB ────────────────────────────────────────
function escolherAvatar() { document.getElementById('input-avatar').click(); }
async function uploadAvatar(event) {
  const file = event.target.files[0]; if (!file) return;
  
  try {
    const url = await uploadImgBB(file);
    await firebase.database().ref('criadoras/' + userId + '/profile/avatar').set(url);
    const avEl = document.getElementById('perfil-avatar');
    const avPl = avEl.nextElementSibling;
    avEl.src = url; avEl.style.display = 'block';
    if (avPl) avPl.style.display = 'none';
    notify('Avatar atualizado.');
  } catch(e) { alert('Erro avatar: ' + e.message); }
}

// ── CAPA → ImgBB ──────────────────────────────────────────
function escolherCapa() { document.getElementById('input-capa').click(); }
async function uploadCapa(event) {
  const file = event.target.files[0]; if (!file) return;
  
  try {
    const url = await uploadImgBB(file);
    await firebase.database().ref('criadoras/' + userId + '/profile/capa').set(url);
    setCapa(url);
    notify('Capa atualizada.');
  } catch(e) { alert('Erro capa: ' + e.message); }
}
</script>
