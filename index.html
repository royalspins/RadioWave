<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #202124;
    --surface: #303134;
    --surface2: #3c3c3f;
    --display-bg: #202124;
    --num-bg: #303134;
    --num-hover: #404044;
    --num-active: #4a4a4e;
    --op-bg: #ea8c00;
    --op-hover: #f09a10;
    --op-active: #d47e00;
    --fn-bg: #5f6368;
    --fn-hover: #6e7378;
    --fn-active: #535759;
    --eq-bg: #ea8c00;
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.55);
    --text-op: #ffffff;
    --ripple: rgba(255,255,255,0.18);
    --radius: 50%;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Roboto', sans-serif;
    display: flex; align-items: flex-end; justify-content: center;
    overflow: hidden;
  }

  /* ── CALCULATOR ── */
  #calculator {
    width: 100%;
    max-width: 412px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: var(--bg);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #calculator.hidden {
    opacity: 0; transform: scale(0.95) translateY(20px);
    pointer-events: none; position: absolute;
  }

  /* ── DISPLAY ── */
  .display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 16px 24px 20px;
    min-height: 180px;
    cursor: default;
    user-select: none;
  }
  #expression {
    font-size: 20px;
    color: var(--text-dim);
    text-align: right;
    min-height: 28px;
    word-break: break-all;
    line-height: 1.4;
    font-weight: 300;
  }
  #display {
    font-size: 72px;
    font-weight: 300;
    color: var(--text);
    text-align: right;
    word-break: break-all;
    line-height: 1.1;
    letter-spacing: -2px;
    transition: font-size 0.1s;
  }
  #display.shrink { font-size: 48px; }
  #display.shrink2 { font-size: 36px; }

  /* ── BUTTON GRID ── */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 12px 16px 24px;
  }

  .btn {
    position: relative;
    overflow: hidden;
    width: 100%;
    aspect-ratio: 1/1;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: 'Roboto', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    background: var(--num-bg);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn:hover   { background: var(--num-hover); }
  .btn:active  { background: var(--num-active); }

  .btn.fn {
    background: var(--fn-bg);
    font-size: 24px;
    color: #202124;
    color: #fff;
  }
  .btn.fn:hover  { background: var(--fn-hover); }
  .btn.fn:active { background: var(--fn-active); }

  .btn.op {
    background: var(--op-bg);
    color: #fff;
    font-size: 32px;
  }
  .btn.op:hover  { background: var(--op-hover); }
  .btn.op:active { background: var(--op-active); }
  .btn.op.active-op {
    background: #fff;
    color: var(--op-bg);
  }

  .btn.eq {
    background: var(--op-bg);
    color: #fff;
    font-size: 36px;
  }
  .btn.eq:hover  { background: var(--op-hover); }
  .btn.eq:active { background: var(--op-active); }

  .btn.zero {
    grid-column: span 2;
    border-radius: 40px;
    justify-content: flex-start;
    padding-left: 32px;
    aspect-ratio: unset;
    height: calc(100% );
  }

  /* Ripple */
  .ripple-el {
    position: absolute;
    border-radius: 50%;
    background: var(--ripple);
    transform: scale(0);
    animation: rippleAnim 0.5s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  /* ── SECRET APP ── */
  #secretApp {
    position: fixed; inset: 0;
    background: #202124;
    z-index: 100;
    opacity: 0; transform: translateY(40px);
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
    overflow: auto;
  }
  #secretApp.visible {
    opacity: 1; transform: translateY(0);
    pointer-events: all;
  }

  /* Back FAB — barely visible */
  #backBtn {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 200;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, background 0.2s;
  }
  #backBtn.visible { opacity: 0.2; pointer-events: all; }
  #backBtn:hover   { opacity: 1 !important; background: rgba(255,255,255,0.12); }
  #backBtn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  @media (min-height: 700px) {
    .display { min-height: 220px; }
  }
  @media (max-width: 360px) {
    .btn { font-size: 24px; }
    .btn.op, .btn.eq { font-size: 28px; }
    .btn-grid { gap: 8px; padding: 8px 10px 20px; }
    #display { font-size: 60px; }
  }
</style>
</head>
<body>

<div id="calculator">
  <div class="display" id="displayWrapper">
    <div id="expression"></div>
    <div id="display">0</div>
  </div>

  <div class="btn-grid">
    <!-- Row 1 -->
    <button class="btn fn" data-action="clear">AC</button>
    <button class="btn fn" data-action="sign">+/−</button>
    <button class="btn fn" data-action="percent">%</button>
    <button class="btn op" data-action="op" data-val="÷">÷</button>
    <!-- Row 2 -->
    <button class="btn" data-action="num" data-val="7">7</button>
    <button class="btn" data-action="num" data-val="8">8</button>
    <button class="btn" data-action="num" data-val="9">9</button>
    <button class="btn op" data-action="op" data-val="×">×</button>
    <!-- Row 3 -->
    <button class="btn" data-action="num" data-val="4">4</button>
    <button class="btn" data-action="num" data-val="5">5</button>
    <button class="btn" data-action="num" data-val="6">6</button>
    <button class="btn op" data-action="op" data-val="−">−</button>
    <!-- Row 4 -->
    <button class="btn" data-action="num" data-val="1">1</button>
    <button class="btn" data-action="num" data-val="2">2</button>
    <button class="btn" data-action="num" data-val="3">3</button>
    <button class="btn op" data-action="op" data-val="+">+</button>
    <!-- Row 5 -->
    <button class="btn zero" data-action="num" data-val="0">0</button>
    <button class="btn" data-action="dot">.</button>
    <button class="btn eq" data-action="equals">=</button>
  </div>
</div>

<!-- Secret App -->
<div id="secretApp">
  <div id="secretInner"></div>
</div>

<!-- Invisible back button -->
<button id="backBtn">
  <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
</button>

<!-- Scan overlay -->
<div id="scanOverlay" style="
  position:fixed;inset:0;pointer-events:none;z-index:150;opacity:0;transition:opacity 0.5s;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);
"></div>

// ─── State ───────────────────────────────────
let current = '0';
let expression = '';
let operator = null;
let operand = null;
let justEvaled = false;
let displayClickCount = 0;
let displayClickTimer = null;

// ─── DOM refs ────────────────────────────────
const calcEl      = document.getElementById('calculator');
const displayEl   = document.getElementById('display');
const exprEl      = document.getElementById('expression');
const secretApp   = document.getElementById('secretApp');
const secretInner = document.getElementById('secretInner');
const backBtn     = document.getElementById('backBtn');
const scanOverlay = document.getElementById('scanOverlay');
const displayWrapper = document.getElementById('displayWrapper');

// ─── Secret logic (Firebase) ─────────────────
async function getStoredPass() {
  // localStorage e a fonte primaria (instantanea)
  const local = localStorage.getItem('c_pref_v1');
  if (local) return local;
  // fallback: tenta buscar do Firebase se local estiver vazio
  try {
    if (_getFn && _docRef) {
      const snap = await _getFn(_docRef);
      if (snap.exists()) {
        const pass = snap.data().pass;
        localStorage.setItem('c_pref_v1', pass);
        return pass;
      }
    }
  } catch {}
  return null;
}

async function setStoredPass(v) {
  // Salva localmente primeiro (instantaneo)
  localStorage.setItem('c_pref_v1', v);
  // Sincroniza com Firebase em background
  try {
    if (_setFn && _docRef) _setFn(_docRef, { pass: v }).catch(() => {});
  } catch {}
}

async function checkSecret(value) {
  const stored = await getStoredPass();
  if (!stored) {
    await setStoredPass(value);
    return false; // primeira vez: salva silenciosamente
  }
  if (value === stored) {
    openSecret();
    return true;
  }
  return false;
}

function openSecret() {
  secretInner.innerHTML = SECRET_HTML_CONTENT;
  calcEl.classList.add('hidden');
  setTimeout(() => {
    secretApp.classList.add('visible');
    backBtn.classList.add('visible');
    scanOverlay.classList.add('show');
  }, 50);
}

function closeSecret() {
  secretApp.classList.remove('visible');
  backBtn.classList.remove('visible');
  setTimeout(() => {
    calcEl.classList.remove('hidden');
    secretInner.innerHTML = '';
  }, 600);
}

// ─── Calculator logic ────────────────────────
function updateDisplay() {
  displayEl.textContent = current.length > 12 ? parseFloat(current).toExponential(4) : current;
  exprEl.textContent = expression;
}

function blinkDisplay() {
  displayEl.classList.remove('blink');
  void displayEl.offsetWidth;
  displayEl.classList.add('blink');
}

function inputNum(v) {
  if (justEvaled) {
    current = v;
    justEvaled = false;
    expression = '';
  } else if (current === '0') {
    current = v;
  } else if (current.length < 14) {
    current += v;
  }
  updateDisplay();
}

function inputDot() {
  if (justEvaled) { current = '0.'; justEvaled = false; }
  else if (!current.includes('.')) current += '.';
  updateDisplay();
}

function inputOp(op) {
  if (operator && !justEvaled) evaluate(false);
  operand = parseFloat(current);
  operator = op;
  expression = current + ' ' + op;
  justEvaled = false;
  current = '0';
  updateDisplay();
}

async function evaluate(triggerSecret = true) {
  const val = current;

  if (operator && operand !== null) {
    // ── has pending operation ──
    const b = parseFloat(current);
    let result;
    if (operator === '+') result = operand + b;
    if (operator === '−') result = operand - b;
    if (operator === '×') result = operand * b;
    if (operator === '÷') result = b === 0 ? 'Erro' : operand / b;
    expression = operand + ' ' + operator + ' ' + b + ' =';
    current = result === 'Erro' ? 'Erro' : String(parseFloat(result.toFixed(10)));
    operator = null; operand = null;
    justEvaled = true;
    blinkDisplay();
    updateDisplay();
  } else {
    // ── plain number pressed = ──
    // always reset justEvaled so next digits start fresh
    justEvaled = false;
    if (triggerSecret) {
      const clean = val.replace(/[^0-9]/g, '');
      if (clean) {
        const opened = await checkSecret(clean);
        if (!opened) {
          expression = val + ' =';
          justEvaled = true;
          updateDisplay();
        }
      }
    }
  }
}

function clearCalc() {
  current = '0'; expression = ''; operator = null; operand = null; justEvaled = false;
  updateDisplay();
}

function toggleSign() {
  if (current !== '0' && current !== 'Erro') {
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    updateDisplay();
  }
}

function percent() {
  if (current !== 'Erro') {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }
}

// ─── Button clicks ───────────────────────────
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    rippleEffect(btn, e);
    const a = btn.dataset.action;
    const v = btn.dataset.val;
    if (a === 'num')    inputNum(v);
    if (a === 'op')     inputOp(v);
    if (a === 'equals') evaluate(true);
    if (a === 'clear')  clearCalc();
    if (a === 'sign')   toggleSign();
    if (a === 'percent') percent();
    if (a === 'dot')    inputDot();
  });
});

// ─── Ripple effect ───────────────────────────
function rippleEffect(btn, e) {
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

// ─── Keyboard support ────────────────────────
document.addEventListener('keydown', e => {
  if (secretApp.classList.contains('visible')) return;
  const k = e.key;
  if (k >= '0' && k <= '9') inputNum(k);
  else if (k === '.') inputDot();
  else if (k === '+') inputOp('+');
  else if (k === '-') inputOp('−');
  else if (k === '*') inputOp('×');
  else if (k === '/') { e.preventDefault(); inputOp('÷'); }
  else if (k === 'Enter' || k === '=') evaluate(true);
  else if (k === 'Backspace') {
    if (current.length > 1) current = current.slice(0, -1);
    else current = '0';
    updateDisplay();
  }
  else if (k === 'Escape') clearCalc();
});

// ─── Display tap × 5 → close secret ─────────
displayWrapper.addEventListener('click', () => {
  displayClickCount++;
  clearTimeout(displayClickTimer);
  if (displayClickCount >= 5) {
    displayClickCount = 0;
    if (secretApp.classList.contains('visible')) closeSecret();
  }
  displayClickTimer = setTimeout(() => displayClickCount = 0, 1500);
});

// ─── Back button ─────────────────────────────
backBtn.addEventListener('click', closeSecret);

// ─── Init ────────────────────────────────────
updateDisplay();

// ── Resize display font based on length ──
function updateDisplay() {
  const len = current.length;
  displayEl.classList.remove('shrink','shrink2');
  if (len > 12) displayEl.classList.add('shrink2');
  else if (len > 8) displayEl.classList.add('shrink');
  displayEl.textContent = current.length > 15 ? parseFloat(current).toExponential(4) : current;
  exprEl.textContent = expression;
  // highlight active op button
  document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active-op'));
  if (operator && !justEvaled) {
    document.querySelectorAll('.btn.op').forEach(b => {
      if (b.dataset.val === operator) b.classList.add('active-op');
    });
  }
}
</script>
